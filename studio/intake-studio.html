<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f6efe6">
  <title>新增你的衣物 | AI 处理台</title>
  <meta
    name="description"
    content="上传衣物原图，生成标准归档图，并将结果加入主衣柜。"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./intake-studio.css">
</head>
<body>
  <a class="skip-link" href="#studio-main">跳到主内容</a>
  <main class="studio-shell" id="studio-main" tabindex="-1">
    <header class="studio-header">
      <a class="back-link" href="../index.html#add">返回新增页</a>
      <div class="header-copy">
        <p class="studio-kicker">AI Intake</p>
        <h1>新增你的衣物</h1>
        <p class="studio-summary">
          上传衣物原图，生成标准归档图，并直接加入主衣柜。
        </p>
      </div>
    </header>

    <section class="studio-layout">
      <section class="control-column">
        <section class="studio-panel compact-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Setup</p>
              <h2>生成设置 <span>Setup</span></h2>
            </div>
          </div>

          <div class="control-stack">
            <div class="control-group">
              <span class="group-label">衣物类型</span>
              <div class="segmented" id="category-switcher">
                <button class="segment is-active" type="button" data-category="top">上装</button>
                <button class="segment" type="button" data-category="bottom">裤装</button>
                <button class="segment" type="button" data-category="outer">外套</button>
                <button class="segment" type="button" data-category="dress">裙装</button>
                <button class="segment" type="button" data-category="accessory">配饰</button>
              </div>
            </div>

            <div class="control-fields">
              <label class="field">
                <span>衣物名称</span>
                <input id="garment-name" name="garment_name" type="text" autocomplete="off" placeholder="例如：奶白色针织开衫…">
              </label>

              <label class="field">
                <span>收纳位置</span>
                <input id="garment-location" name="garment_location" type="text" autocomplete="off" value="待整理">
              </label>

              <label class="field">
                <span>颜色标签</span>
                <input id="garment-color" name="garment_color" type="text" autocomplete="off" value="待确认">
              </label>

              <label class="field">
                <span>季节标签</span>
                <input id="garment-season" name="garment_season" type="text" autocomplete="off" value="待确认">
              </label>

              <label class="field">
                <span>购入时间</span>
                <input id="garment-purchase-date" name="garment_purchase_date" type="date" autocomplete="off">
              </label>

              <label class="field">
                <span>价格</span>
                <input id="garment-price" name="garment_price" type="text" inputmode="decimal" autocomplete="off" placeholder="例如：299…">
              </label>

              <label class="field field-wide">
                <span>品牌备注</span>
                <input id="garment-brand" name="garment_brand" type="text" autocomplete="off" placeholder="例如：优衣库 / 淘宝店铺…">
              </label>
            </div>
          </div>

          <div class="action-row">
            <button class="primary-button" type="button" id="process-button">生成标准图</button>
            <button class="ghost-button" type="button" id="download-button" disabled>下载标准图</button>
            <button class="ghost-button" type="button" id="import-button" disabled>加入主衣柜</button>
          </div>
        </section>
      </section>

      <section class="preview-column">
        <section class="studio-panel preview-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Preview</p>
              <h2>标准归档图生成 <span>Workbench</span></h2>
            </div>
          </div>

          <input id="file-input" name="source_image" type="file" accept="image/*" hidden>

          <div class="preview-workbench">
            <div class="preview-stage checker tall workbench-stage" id="dropzone" tabindex="0" aria-label="上传衣物照片">
              <canvas id="source-canvas" class="preview-layer source-layer"></canvas>
              <canvas id="standard-canvas" class="preview-layer standard-layer" width="1200" height="1200"></canvas>

              <div class="upload-empty" id="upload-empty">
                <p class="upload-empty-title">上传衣物原图</p>
                <p class="upload-empty-copy">点击选择文件，或直接拖拽图片到这里。</p>
                <button class="primary-button" type="button" data-trigger-upload>选择文件上传</button>
              </div>

              <div class="processing-overlay" id="processing-overlay" hidden aria-live="polite">
                <span class="processing-spinner" aria-hidden="true"></span>
                <p class="processing-title">正在生成标准归档图</p>
                <p class="processing-copy">系统正在整理边界、版型和展示效果，请稍候。</p>
              </div>
            </div>
          </div>
        </section>
      </section>

      <section class="middle-column">
        <section class="studio-panel archive-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Archive</p>
              <h2>归档预览 <span>Preview</span></h2>
            </div>
            <div class="status-badge" id="preview-status">等待上传</div>
          </div>

          <article class="archive-preview-card" id="archive-summary">
            <div class="archive-preview-media">
              <img id="archive-preview-image" alt="" aria-hidden="true" width="320" height="320" hidden>
              <div class="archive-preview-empty" id="archive-preview-empty" aria-hidden="true"></div>
            </div>

            <div class="archive-preview-body">
              <h3 id="archive-preview-name">未命名衣物</h3>

              <dl class="archive-preview-meta">
                <div class="archive-preview-row">
                  <dt>分类</dt>
                  <dd id="archive-preview-category">上装</dd>
                </div>
                <div class="archive-preview-row">
                  <dt>位置</dt>
                  <dd id="archive-preview-location">待整理</dd>
                </div>
                <div class="archive-preview-row">
                  <dt>颜色</dt>
                  <dd id="archive-preview-color">待确认</dd>
                </div>
                <div class="archive-preview-row">
                  <dt>季节</dt>
                  <dd id="archive-preview-season">待确认</dd>
                </div>
                <div class="archive-preview-row">
                  <dt>购入</dt>
                  <dd id="archive-preview-purchase-date">未填写</dd>
                </div>
                <div class="archive-preview-row">
                  <dt>价格</dt>
                  <dd id="archive-preview-price">未填写</dd>
                </div>
                <div class="archive-preview-row">
                  <dt>品牌</dt>
                  <dd id="archive-preview-brand">未填写</dd>
                </div>
              </dl>
            </div>
          </article>
        </section>
      </section>
    </section>
  </main>

  <script src="../public-config.js"></script>
  <script src="./intake-studio.js"></script>
</body>
</html>
